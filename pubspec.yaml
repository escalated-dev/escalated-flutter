name: escalated
description: A Flutter library package for customer support ticket management. Provides pre-built screens, widgets, and services for integrating a full support ticket system into any Flutter app.
version: 1.0.0
homepage: https://github.com/escalated-dev/escalated
repository: https://github.com/escalated-dev/escalated
issue_tracker: https://github.com/escalated-dev/escalated/issues

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.4.0
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  flutter_secure_storage: ^9.2.0
  image_picker: ^1.0.0
  file_picker: ^8.0.0
  flutter_html: ^3.0.0
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
